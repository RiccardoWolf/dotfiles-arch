### WINDOWS AND WORKSPACES ###

# https://wiki.hypr.land/Configuring/Window-Rules/
# https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Ignore maximize requests from apps.
windowrule = suppress_event maximize, match:class .*

# Fix some dragging issues with XWayland
windowrule = no_initial_focus on, match:xwayland 1, match:float 1

# No blur for chrome context menu
windowrule = no_blur on, match:class ^()$, match:title ^()$

# Float for blueman-manager
windowrule = float on, match:class (blueman-manager), match:title (Bluetooth Devices)
windowrule = size 400 400, match:class (blueman-manager), match:title (Bluetooth Devices)
windowrule = move 70% 5%, match:class (blueman-manager), match:title (Bluetooth Devices)
